# -----------------------------------------------------------------------------
# 工作流目的说明：
# 此工作流用于监听仓库 main/master/GM82 分支上常见压缩文件格式的推送事件。
# 当检测到 .zip, .7z, .rar, .tar, .tar.gz, .tgz, .tar.bz2, .tar.xz 文件时，
# 工作流会自动检出代码，安装必要的解压工具（如 7z 和 unrar），
# 然后为每个压缩包创建一个同名的独立文件夹，在其中执行解压操作。
# 解压完成后，将解压出的文件添加到 Git 暂存区，
# 删除原始压缩包，并将这些变更提交且推送到远程仓库。
# 若某个压缩包解压失败，会记录错误并继续处理其余文件，不会中断整体流程。
# -----------------------------------------------------------------------------

name: 自动解压多种常见格式压缩包
on:
  push:
    branches: [ main, master, GM82 ]
    paths:
      - '**.zip'
      - '**.7z'
      - '**.rar'
      - '**.tar'
      - '**.tar.gz'
      - '**.tgz'
      - '**.tar.bz2'
      - '**.tar.xz'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract_all_archives:
    runs-on: ubuntu-22.04
    if: github.actor != 'github-actions[bot]'
    concurrency:
      group: extract-archives-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装必要的解压依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y p7zip-full unrar

      - name: 查找、原地解压、强制添加并删除压缩包
        run: |
          set -euo pipefail

          echo "===== 调试信息 ====="
          echo "当前工作目录: $(pwd)"
          echo "Bash 版本: ${BASH_VERSION}"
          echo "===================="
          echo ""

          # ------------------------------------------------------------------
          # 将 find 结果写入临时文件，避免 YAML 续行和管道子 shell 的所有隐患
          # find 命令保持单行，杜绝 \ 续行 + 尾部空白导致的解析错误
          # ------------------------------------------------------------------
          find . -type f $$ -iname "*.zip" -o -iname "*.7z" -o -iname "*.rar" -o -iname "*.tar" -o -iname "*.tar.gz" -o -iname "*.tgz" -o -iname "*.tar.bz2" -o -iname "*.tar.xz" $$ -not -path "./.git/*" > /tmp/archives_list.txt

          ARCHIVE_COUNT=$(wc -l < /tmp/archives_list.txt)

          if [ "$ARCHIVE_COUNT" -eq 0 ]; then
            echo "未在此次检出的代码中找到支持的压缩文件。"
            exit 0
          fi

          echo "找到 $ARCHIVE_COUNT 个压缩文件:"
          cat /tmp/archives_list.txt
          echo "---"

          HAS_ERROR=0

          # ------------------------------------------------------------------
          # 从临时文件逐行读取（不在管道子 shell 中，变量修改可保留）
          # ------------------------------------------------------------------
          while IFS= read -r FILE; do
            [ -f "$FILE" ] || continue

            TARGET_DIR=$(dirname "$FILE")
            FILENAME=$(basename "$FILE")
            LOWER_FILE=$(echo "$FILENAME" | tr '[:upper:]' '[:lower:]')

            # ----------------------------------------------------------------
            # 根据完整后缀名剥离扩展，得到不含后缀的文件名
            # 优先匹配长后缀（如 *.tar.gz 优先于 *.tar）
            # ----------------------------------------------------------------
            case "$LOWER_FILE" in
              *.tar.gz)  BASENAME="${FILENAME%.tar.gz}" ;;
              *.tar.bz2) BASENAME="${FILENAME%.tar.bz2}" ;;
              *.tar.xz)  BASENAME="${FILENAME%.tar.xz}" ;;
              *.tgz)     BASENAME="${FILENAME%.tgz}" ;;
              *.tar)     BASENAME="${FILENAME%.tar}" ;;
              *.zip)     BASENAME="${FILENAME%.zip}" ;;
              *.7z)      BASENAME="${FILENAME%.7z}" ;;
              *.rar)     BASENAME="${FILENAME%.rar}" ;;
              *)         BASENAME="${FILENAME%.*}" ;;
            esac

            # 为该压缩包创建专属文件夹
            DEST_DIR="$TARGET_DIR/$BASENAME"
            mkdir -p "$DEST_DIR"

            echo ""
            echo "正在处理: $FILE"
            echo "  -> 解压到独立目录: $DEST_DIR"

            # ----------------------------------------------------------------
            # 执行解压；失败则记录并继续，不中断整个流程
            # ----------------------------------------------------------------
            EXTRACT_OK=0

            case "$LOWER_FILE" in
              *.zip)
                unzip -o "$FILE" -d "$DEST_DIR" || EXTRACT_OK=1
                ;;
              *.7z)
                7z x "$FILE" -o"$DEST_DIR" -y || EXTRACT_OK=1
                ;;
              *.rar)
                unrar x -o+ "$FILE" "$DEST_DIR/" || EXTRACT_OK=1
                ;;
              *.tar)
                tar -xf "$FILE" -C "$DEST_DIR" || EXTRACT_OK=1
                ;;
              *.tar.gz | *.tgz)
                tar -xzf "$FILE" -C "$DEST_DIR" || EXTRACT_OK=1
                ;;
              *.tar.bz2)
                tar -xjf "$FILE" -C "$DEST_DIR" || EXTRACT_OK=1
                ;;
              *.tar.xz)
                tar -xJf "$FILE" -C "$DEST_DIR" || EXTRACT_OK=1
                ;;
              *)
                echo "  -> 错误: 未知的文件扩展名 ($FILE)。"
                EXTRACT_OK=1
                ;;
            esac

            if [ "$EXTRACT_OK" -eq 0 ]; then
              echo "  -> 解压成功。"

              # 暂存该专属目录中的所有文件（强制，忽略 .gitignore）
              echo "  -> 暂存 $DEST_DIR 中的文件..."
              git add --force "$DEST_DIR"

              # 删除原始压缩包并暂存删除操作
              echo "  -> 正在删除: $FILE"
              rm "$FILE"
              git add "$FILE"
            else
              echo "  -> ⚠ 解压 $FILE 失败，跳过该文件，继续处理其余压缩包。"
              HAS_ERROR=1
              # 清理空的专属文件夹
              rmdir "$DEST_DIR" 2>/dev/null || true
            fi

          done < /tmp/archives_list.txt

          echo ""
          echo "---"
          echo "所有受支持的压缩文件处理完毕。"

          # 清理临时文件
          rm -f /tmp/archives_list.txt

      - name: 提交变动
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if ! git diff --staged --quiet; then
            echo "检测到暂存的变动，正在提交..."
            git commit -m "Chore: 自动解压并删除多种格式压缩包"

            # 先 rebase 远端最新代码，防止因远端新增 commit 导致推送被拒
            echo "正在 rebase 远端最新变更..."
            git pull --rebase origin main

            git push
          else
            echo "没有文件变动需要提交。"
          fi
